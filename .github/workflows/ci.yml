name: ARGUS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Backend checks ─────────────────────────────────────────────
  backend:
    name: Backend — lint + import check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check app/ --select E,F,W --ignore E501

      - name: Check all modules import cleanly
        # Verifies no missing imports or circular deps without needing live
        # Neo4j/Postgres/Redis connections — model files are faked with empty
        # placeholders so ScoringService's file-load path doesn't crash.
        run: |
          mkdir -p app/models
          touch app/models/rf_model.pkl
          touch app/models/graphsage_weights.pt
          python -c "
          import os
          os.environ.setdefault('NEO4J_URI', 'neo4j+s://placeholder.databases.neo4j.io')
          os.environ.setdefault('NEO4J_USERNAME', 'neo4j')
          os.environ.setdefault('NEO4J_PASSWORD', 'placeholder')
          os.environ.setdefault('POSTGRES_PASSWORD', 'placeholder')
          os.environ.setdefault('REDIS_URL', 'redis://localhost:6379/0')

          # Import routers only — avoids triggering service __init__ connections
          from app.routers import scoring, graph, cases, sar, transactions
          print('All routers import cleanly')
          "

  # ── Frontend checks ────────────────────────────────────────────
  frontend:
    name: Frontend — install + build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: aml-dashboard/package-lock.json

      - name: Install
        working-directory: aml-dashboard
        run: npm ci --prefer-offline

      - name: Build
        working-directory: aml-dashboard
        env:
          VITE_API_BASE: https://argus-api.onrender.com
        run: npm run build

  # ── Docker build check ─────────────────────────────────────────
  docker:
    name: Docker — image builds without errors
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t argus-api:ci .
