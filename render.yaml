

# Render Blueprint — ARGUS backend
# Free tier compatible — no disks, correct docker runtime syntax
#
# Model files cannot use persistent disk on free tier.
# Upload them via the Render Shell after first deploy (see DEPLOYMENT.md).

services:

  # ── FastAPI (Web Service) ──────────────────────────────────────
  - type: web
    name: argus-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health

    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: POSTGRES_HOST
        fromDatabase:
          name: argus-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: argus-postgres
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: argus-postgres
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: argus-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: argus-postgres
          property: password
      - key: REDIS_URL
        sync: false
      - key: OLLAMA_URL
        value: ""
      - key: OLLAMA_MODEL
        value: llama3.1

  # ── Celery Worker (Background Worker) ─────────────────────────
  - type: worker
    name: argus-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A app.celery_app worker --loglevel=info --concurrency=1
    plan: free

    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: POSTGRES_HOST
        fromDatabase:
          name: argus-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: argus-postgres
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: argus-postgres
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: argus-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: argus-postgres
          property: password
      - key: REDIS_URL
        sync: false
        

# ── Managed databases ──────────────────────────────────────────
databases:
  - name: argus-postgres
    plan: free
    databaseName: aml_cases

  - name: argus-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all (Render internal routing handles isolation)
