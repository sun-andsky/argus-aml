# Render Blueprint — ARGUS backend (free tier compatible)
# Redis is NOT provisioned here — use Upstash free tier instead.
# Set REDIS_URL manually in the Render dashboard after deploying.
# See DEPLOYMENT.md Part 3B for Upstash setup instructions.

services:

  - type: web
    name: argus-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: /app/start.sh
    plan: free
    healthCheckPath: /health

    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false          # Set manually from Upstash — see DEPLOYMENT.md
      - key: POSTGRES_HOST
        fromDatabase:
          name: argus-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: argus-postgres
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: argus-postgres
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: argus-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: argus-postgres
          property: password
      - key: OLLAMA_URL
        value: ""
      - key: OLLAMA_MODEL
        value: llama3.1

databases:
  - name: argus-postgres
    plan: free
    databaseName: aml_cases
    user: postgres
