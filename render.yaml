# Render Blueprint — ARGUS backend (free tier compatible)
# API + Celery worker run together in one web service via start.sh

services:

  - type: web
    name: argus-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: /app/start.sh
    plan: free
    healthCheckPath: /health

    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: POSTGRES_HOST
        fromDatabase:
          name: argus-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: argus-postgres
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: argus-postgres
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: argus-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: argus-postgres
          property: password
      - key: REDIS_URL
        fromService:
          type: redis
          name: argus-redis
          property: connectionString
      - key: OLLAMA_URL
        value: ""
      - key: OLLAMA_MODEL
        value: llama3.1

databases:
  - name: argus-postgres
    plan: free
    databaseName: aml_cases
    user: postgres

  - name: argus-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Render internal
