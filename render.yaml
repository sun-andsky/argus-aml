# Render Blueprint — ARGUS backend (free tier compatible)
# Redis: use Upstash free tier — set REDIS_URL manually in Render dashboard
# Model files: downloaded at startup from Google Drive via download_models.sh

services:

  - type: web
    name: argus-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: /app/start.sh
    plan: free
    healthCheckPath: /health

    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
      - key: POSTGRES_HOST
        fromDatabase:
          name: argus-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: argus-postgres
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: argus-postgres
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: argus-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: argus-postgres
          property: password
      - key: OLLAMA_URL
        value: ""
      - key: OLLAMA_MODEL
        value: llama3.1
      - key: GDRIVE_RF_MODEL_ID
        sync: false
      - key: GDRIVE_SAGE_WEIGHTS_ID
        sync: false
      - key: GDRIVE_FEATURES_ID
        sync: false
      - key: GDRIVE_EDGES_ID
        sync: false

databases:
  - name: argus-postgres
    plan: free
    databaseName: aml_cases
